services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: firstclub
      MYSQL_USER: firstclub
      MYSQL_PASSWORD: firstclub
      MYSQL_ROOT_PASSWORD: firstclub
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "8090:80"
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: firstclub

volumes:
  mysql_data:
