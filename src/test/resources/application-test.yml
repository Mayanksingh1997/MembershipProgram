spring:
  profiles:
    active: mysql
  docker:
    compose:
      enabled: false
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/${DB_NAME:firstclub}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USER:firstclub}
    password: ${DB_PASSWORD:firstclub}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    locations: classpath:db/migration

membership:
  expiry-cron: "0 0 1 * * *"
