server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: firstclub
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mysql}
  config:
    import: classpath:config/membership-catalog.yml
  docker:
    compose:
      file: docker/docker-compose.yml
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

membership:
  expiry-cron: ${MEMBERSHIP_EXPIRY_CRON:0 0 1 * * *}
  tier-discounts:
    silver-percent: ${MEMBERSHIP_TIER_SILVER_DISCOUNT_PERCENT:5}
    gold-percent: ${MEMBERSHIP_TIER_GOLD_DISCOUNT_PERCENT:10}
    platinum-percent: ${MEMBERSHIP_TIER_PLATINUM_DISCOUNT_PERCENT:15}

auth:
  jwt:
    signing-key: ${JWT_SIGNING_KEY:Zmlyc3RjbHViLXNlY3JldC1rZXktZm9yLWhzMjU2LXNpbmluZy1taW5pbXVtLTMyLWJ5dGVz}
    issuer: ${JWT_ISSUER:firstclub}
    audience: ${JWT_AUDIENCE:firstclub-api}
    access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:10}
    refresh-token-ttl-days: ${JWT_REFRESH_TOKEN_TTL_DAYS:7}
  public-endpoints:
    - /actuator/health
    - /actuator/metrics
    - /actuator/info
    - /actuator/prometheus
    - /swagger-ui
    - /v3/api-docs
    - /api/v1/auth/login
    - /api/v1/auth/refresh

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui
